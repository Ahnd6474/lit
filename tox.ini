[tox]
envlist = py311, py312, py313, pkg
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run the test suite under {basepython}
deps =
    pytest>=8
commands =
    python -m pytest {posargs}

[testenv:pkg]
description = Build and validate distributable artifacts
skip_install = true
deps =
    build>=1.2
    twine>=5.1
commands =
    python -m build
    python -m twine check dist/*

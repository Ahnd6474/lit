[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lit"
version = "0.1.0"
description = "A lightweight local-only version control prototype."
requires-python = ">=3.12"
dependencies = ["PySide6>=6.8"]

[project.scripts]
lit = "lit.cli:main"
lit-gui = "lit_gui.app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
